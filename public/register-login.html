<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Retro Notes – Přihlášení / Registrace</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="auth.js"></script>
</head>
<body>

<main>
<header>
    <marquee> Retro Notes 2000 </marquee>
</header>

<div class="nav">
    <button id="toggleForm">Přepnout na registraci / login</button>
</div>

<div id="login-form">
    <form>
        <h3>Login</h3>
        <input type="text" id="login-username" placeholder="Uživatelské jméno">
        <input type="password" id="login-password" placeholder="Heslo">
        <button type="button" id="login-btn">Přihlásit</button>
    </form>
</div>

<div id="register-form" style="display:none;">
    <form>
        <h3>Registrace</h3>
        <input type="text" id="register-username" placeholder="Uživatelské jméno">
        <input type="password" id="register-password" placeholder="Heslo">
        <button type="button" id="register-btn">Registrovat</button>
    </form>
</div>

<footer>
    Retro Notes &copy; 2000
</footer>
</main>

<script>
document.getElementById("toggleForm").addEventListener("click", ()=>{
    const loginForm = document.getElementById("login-form")
    const registerForm = document.getElementById("register-form")
    if(loginForm.style.display === "none"){
        loginForm.style.display = "block"
        registerForm.style.display = "none"
    }else{
        loginForm.style.display = "none"
        registerForm.style.display = "block"
    }
})
</script>

</body>
</html>
