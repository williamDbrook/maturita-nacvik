<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Retro Notes – Přihlášení / Registrace</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="auth.js"></script>
</head>
<body>

<header>
    <marquee> Retro Notes 2000 </marquee>
</header>

<div class="nav">
    <button id="toggleForm">Přepnout na registraci / login</button>
</div>

<div id="loginForm">
    <form id="formLogin">
        <h3>Login</h3>
        <input type="text" id="loginUsername" placeholder="Uživatelské jméno">
        <input type="password" id="loginPassword" placeholder="Heslo">
        <button type="submit">Přihlásit</button>
    </form>
</div>

<div id="registerForm" style="display:none;">
    <form id="formRegister">
        <h3>Registrace</h3>
        <input type="text" id="regUsername" placeholder="Uživatelské jméno">
        <input type="password" id="regPassword" placeholder="Heslo">
        <button type="submit">Registrovat</button>
    </form>
</div>

<footer>
    Retro Notes &copy; 2000
</footer>

<script>
const loginForm = document.getElementById("loginForm")
const registerForm = document.getElementById("registerForm")
const toggleBtn = document.getElementById("toggleForm")

toggleBtn.addEventListener("click", ()=>{
    if(loginForm.style.display === "none"){
        loginForm.style.display = "block"
        registerForm.style.display = "none"
    }else{
        loginForm.style.display = "none"
        registerForm.style.display = "block"
    }
})
</script>

</body>
</html>
